{% extends 'core/base.html' %}

{% block content %}

<h1>Edit Company</h1>

<a href="{% url 'companies_list' %}" class="btn">Back to Companies</a>

<br><br>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <label>Company Name</label><br>
        <input type="text" name="company_name" value="{{ company.company_name }}" required><br><br>

        <label>Contact Name</label><br>
        <input type="text" name="contact_name" value="{{ company.contact_name }}" required><br><br>

        <label>Email</label><br>
        <input type="email" name="email" value="{{ company.email }}" required><br><br>

        <label>Phone</label><br>
        <input type="text" name="phone" value="{{ company.phone }}" required><br><br>

        <label>Website</label><br>
        <input type="url" name="website" value="{{ company.website }}"><br><br>

        <label>LinkedIn URL</label><br>
        <input type="url" name="linkedin_url" value="{{ company.linkedin_url }}"><br><br>

        <label>Industry</label><br>
        <input type="text" name="industry" value="{{ company.industry }}" required><br><br>

        <label>Country</label><br>
        <input type="text" name="country" value="{{ company.country }}" required><br><br>

        <label>Company Size</label><br>
        <input type="text" name="company_size" value="{{ company.company_size }}"><br><br>

        <label>Notes</label><br>
        <textarea name="notes">{{ company.notes }}</textarea><br><br>

        <button type="submit" class="btn">Update Company</button>
    </form>
</div>

{% endblock %}
