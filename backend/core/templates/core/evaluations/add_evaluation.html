{% extends 'core/base.html' %}

{% block content %}

<h1>Add Evaluation</h1>

<a href="{% url 'evaluations_list' %}" class="btn">Back to Evaluations</a>

<br><br>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <label>Application</label><br>
        <select name="application" required>
            <option value="">Select Application</option>
            {% for application in applications %}
                <option value="{{ application.id }}">
                    {{ application.candidate.full_name }} - {{ application.job.job_title }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Score</label><br>
        <input type="number" name="score" min="0" max="100" required><br><br>

        <label>Recommendation</label><br>
        <select name="recommendation">
            <option value="">Select Recommendation</option>
            {% for value, label in recommendation_choices %}
                <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select><br><br>

        <label>Feedback</label><br>
        <textarea name="feedback" required></textarea><br><br>

        <button type="submit" class="btn">Save Evaluation</button>
    </form>
</div>

{% endblock %}
