<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Recruitment CRM</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
        }

        .login-card {
            background-color: #ffffff;
            width: 420px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .login-card h1 {
            margin: 0;
            font-size: 28px;
            color: #0f172a;
            text-align: center;
        }

        .login-card p {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-top: 7px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .message {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 18px;
            text-align: center;
        }

        .footer-text {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h1>RecruitCRM</h1>
        <p>Login to your recruitment workspace</p>

        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>

            <div style="margin-top:15px;">
                <a href="{% url 'google_login' %}"
                style="
                display:block;
                text-align:center;
                background:#fff;
                color:#444;
                padding:12px;
                border-radius:8px;
                text-decoration:none;
                border:1px solid #ddd;
                font-weight:bold;">
                
                Continue with Google
                </a>
            </div>

        </form>

        <div class="footer-text">
            Recruitment CRM System
        </div>
    </div>

</body>
</html>
