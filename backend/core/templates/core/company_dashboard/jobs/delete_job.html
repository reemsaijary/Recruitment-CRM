{% extends 'core/company_dashboard/base_company.html' %}

{% block content %}

<h1>Delete Job</h1>

<div class="card">
    <p>Are you sure you want to delete <strong>{{ job.job_title }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="action-btn">Yes, Delete</button>
        <a href="{% url 'company_jobs_list' %}" class="action-btn">Cancel</a>
    </form>
</div>

{% endblock %}
