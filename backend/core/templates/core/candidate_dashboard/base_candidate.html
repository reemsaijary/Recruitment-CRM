<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Dashboard</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
/* 
   1. GLOBAL RESET
*/
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
}

a {
    text-decoration: none;
}

/* 
   2. MAIN LAYOUT
*/
.layout {
    display: flex;
    min-height: 100vh;
    align-items: flex-start;
}

.main {
    flex: 1;
    min-width: 0;
}

.container {
    padding: 35px;
}

/* 
   3. SIDEBAR
*/
.sidebar {
    width: 260px;
    height: 100vh;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, #020617, #1e293b);
    color: white;
    padding: 20px 15px;
    transition: width 0.3s ease;
    overflow-y: auto;
}

.sidebar.closed {
    width: 80px;
}

.sidebar.closed .sidebar-text,
.sidebar.closed .logo {
    display: none;
}

.sidebar.closed a {
    justify-content: center;
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.logo {
    font-size: 26px;
    font-weight: bold;
}

.toggle-btn {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e2e8f0;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: #2563eb;
    color: white;
}

.sidebar i {
    width: 20px;
}

/* 
   4. NAVBAR
*/
.navbar {
    background: white;
    padding: 25px 35px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h2 {
    margin: 0;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    color: #1e293b;
    background: #f1f5f9;
    padding: 10px 16px;
    border-radius: 10px;
}

/* 
   5. PAGE HEADERS
*/
.dashboard-header,
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.dashboard-header h1,
.page-header h1 {
    margin: 0;
    font-size: 32px;
}

.dashboard-header p,
.page-subtitle {
    color: #64748b;
    margin-top: 8px;
    font-size: 15px;
}

.header-actions,
.page-actions {
    display: flex;
    gap: 10px;
}

/* 
   6. CARDS
*/
.card,
.stat-card,
.quick-actions {
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    overflow: hidden;
}

.info-section-card {
    margin-bottom: 28px;
}

.info-section-card h3 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 0;
    margin-bottom: 20px;
}

.info-section-card h3 i {
    color: #2563eb;
}

.info-section-card p {
    margin: 12px 0;
    color: #334155;
}

/* 
   7. BUTTONS
*/
.action-btn,
.primary-btn,
.secondary-btn,
.small-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.action-btn,
.primary-btn {
    background: #2563eb;
    color: white;
}

.action-btn {
    padding: 12px 18px;
    border-radius: 10px;
}

.primary-btn,
.secondary-btn {
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 14px;
}

.secondary-btn {
    background: white;
    color: #0f172a;
    border: 1px solid #dbe3ef;
}

.small-btn {
    padding: 7px 11px;
    border-radius: 7px;
    font-size: 14px;
    margin-right: 5px;
    color: white;
}

.view-btn {
    background: #2563eb;
}

.edit-btn {
    background: #16a34a;
}

.delete-btn {
    background: #dc2626;
}

.action-btn:hover,
.primary-btn:hover,
.view-btn:hover {
    background: #1d4ed8;
}

/* 
   8. TABLES
*/
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0f172a;
    color: white;
    padding: 14px;
    text-align: left;
}

td {
    padding: 14px;
    border-bottom: 1px solid #e5e7eb;
}

tr:hover {
    background: #f8fafc;
}

.table-subtext {
    display: block;
    color: #64748b;
    font-size: 13px;
    margin-top: 4px;
}

/* 
   9. FORMS AND SEARCH
*/
form {
    display: grid;
    gap: 16px;
}

form label {
    font-weight: bold;
    margin-bottom: 6px;
}

form input,
form textarea,
form select {
    width: 100%;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 15px;
}

form textarea {
    min-height: 120px;
    resize: vertical;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.full-width {
    grid-column: 1 / -1;
}

.search-card {
    padding: 18px 25px;
    margin-bottom: 20px;
}

.search-form {
    display: flex;
    gap: 12px;
    align-items: center;
}

.search-form input {
    flex: 1;
}

.search-form select {
    max-width: 180px;
}

/* 
   10. DASHBOARD HOME
*/
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
    margin-top: 25px;
}

.stat-card {
    display: flex;
    align-items: center;
    gap: 20px;
}

.stat-link {
    color: inherit;
    transition: 0.2s ease;
}

.stat-link:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

.stat-icon {
    width: 55px;
    height: 55px;
    background: #dbeafe;
    color: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    font-size: 24px;
}

.stat-card h3 {
    margin: 0;
    color: #2563eb;
    font-size: 18px;
}

.stat-card p {
    font-size: 30px;
    margin: 10px 0 0;
    font-weight: bold;
}

.quick-actions {
    margin-top: 35px;
}

.action-buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

/* 
   11. SHARED MINI STATS
*/
.candidate-job-stats-grid,
.candidate-application-stats-grid {
    display: grid;
    gap: 18px;
    margin-bottom: 24px;
}

.candidate-job-stats-grid {
    grid-template-columns: repeat(3, 1fr);
}

.candidate-application-stats-grid {
    grid-template-columns: repeat(5, 1fr);
}

.mini-stat-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
}

.mini-stat-card i {
    width: 48px;
    height: 48px;
    background: #dbeafe;
    color: #2563eb;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
}

.mini-stat-card span {
    color: #64748b;
    font-size: 14px;
}

.mini-stat-card strong {
    display: block;
    font-size: 26px;
    color: #0f172a;
    margin-top: 4px;
}

/* 
   12. STATUS BADGES
*/
.status-pill,
.app-status-badge {
    display: inline-block;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
}

.status-pill,
.status-applied {
    background: #dbeafe;
    color: #1d4ed8;
}

.status-screening {
    background: #fef3c7;
    color: #92400e;
}

.status-shortlisted {
    background: #ede9fe;
    color: #5b21b6;
}

.status-interview-scheduled,
.status-interview-done {
    background: #cffafe;
    color: #0e7490;
}

.status-evaluated {
    background: #e0e7ff;
    color: #3730a3;
}

.status-offer-sent {
    background: #fef9c3;
    color: #854d0e;
}

.status-hired {
    background: #dcfce7;
    color: #166534;
}

.status-rejected {
    background: #fee2e2;
    color: #991b1b;
}

/* 
   13. DETAILS PAGES
*/
.details-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    margin-bottom: 28px;
}

.info-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 18px;
}

.info-box span {
    display: block;
    color: #64748b;
    margin-bottom: 8px;
    font-size: 14px;
}

.info-box strong {
    color: #0f172a;
    font-size: 17px;
}

.job-info-grid,
.application-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.description-box {
    margin-top: 24px;
}

.description-box p {
    color: #334155;
    line-height: 1.7;
}

.application-status-card {
    margin-top: 28px;
}

/* 
   14. CANDIDATE JOBS PAGE
*/
.candidate-jobs-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
}

.candidate-job-card {
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    border: 1px solid #e2e8f0;
    transition: 0.2s ease;
}

.candidate-job-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
}

.job-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
}

.job-card-top h3 {
    margin: 0 0 8px;
    color: #0f172a;
    font-size: 22px;
}

.job-card-top p {
    color: #64748b;
    margin: 0;
}

.job-card-info {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 18px 0;
}

.job-card-info span {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #334155;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
}

.job-card-info i {
    color: #2563eb;
    margin-right: 5px;
}

.job-card-description {
    color: #475569;
    line-height: 1.6;
    min-height: 65px;
}

.job-card-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.already-applied-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #dcfce7;
    color: #166534;
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
}

/* 
   15. APPLICATION DETAILS PAGE
*/
.candidate-application-hero,
.candidate-job-hero {
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: white;
    border-radius: 22px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
}

.candidate-application-hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
}

.candidate-application-hero h1,
.candidate-job-hero h1 {
    font-size: 34px;
    margin: 14px 0 8px;
}

.candidate-application-hero p,
.candidate-job-hero p {
    color: #dbeafe;
    margin: 0 0 16px;
}

.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
}

.candidate-job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.candidate-job-tags span {
    background: rgba(255,255,255,0.15);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
}

/* 
   16. APPLICATION PROGRESS
*/
.progress-steps {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 16px;
}

.progress-step {
    min-width: 90px;
    text-align: center;
    color: #94a3b8;
    font-weight: 700;
    font-size: 13px;
}

.progress-step i {
    width: 42px;
    height: 42px;
    background: #e2e8f0;
    color: #64748b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 8px;
}

.progress-step.active {
    color: #0f172a;
}

.progress-step.active i {
    background: #2563eb;
    color: white;
}

.progress-line {
    flex: 1;
    height: 3px;
    background: #dbeafe;
    border-radius: 999px;
    margin-bottom: 22px;
}

/* 
   17. EMPTY STATE
*/
.empty-state {
    text-align: center;
    padding: 45px 20px;
}

.empty-icon {
    width: 70px;
    height: 70px;
    background: #dbeafe;
    color: #2563eb;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    font-size: 30px;
}

/* 
   18. PAGINATION
*/
.pagination {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.pagination a {
    background: #2563eb;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
}

.pagination span {
    font-weight: 600;
    color: #0f172a;
}

/* 
   19. RESPONSIVE DESIGN
*/
@media (max-width: 1100px) {
    .candidate-application-stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .candidate-application-hero {
        flex-direction: column;
        align-items: flex-start;
    }
}

@media (max-width: 1000px) {
    .candidate-jobs-grid,
    .candidate-job-stats-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 900px) {
    .progress-steps {
        flex-direction: column;
        align-items: flex-start;
    }

    .progress-line {
        width: 3px;
        height: 22px;
        margin-left: 20px;
        margin-bottom: 0;
    }

    .progress-step {
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
    }

    .progress-step i {
        margin: 0;
    }
}

@media (max-width: 768px) {
    .sidebar {
        width: 80px;
    }

    .sidebar .sidebar-text,
    .sidebar .logo {
        display: none;
    }

    .sidebar a {
        justify-content: center;
    }

    .navbar {
        padding: 20px;
    }

    .container {
        padding: 20px;
    }

    .dashboard-header,
    .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .form-grid,
    .details-grid,
    .job-info-grid,
    .application-info-grid {
        grid-template-columns: 1fr;
    }

    .search-form {
        flex-direction: column;
        align-items: stretch;
    }

    .search-form select {
        max-width: 100%;
    }
}

@media (max-width: 700px) {
    .candidate-application-stats-grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">RecruitCRM</div>

            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <a href="{% url 'candidate_dashboard' %}">
            <i class="fa-solid fa-house"></i>
            <span class="sidebar-text">Dashboard</span>
        </a>

        <a href="{% url 'candidate_jobs_list' %}">
            <i class="fa-solid fa-briefcase"></i>
            <span class="sidebar-text">Available Jobs</span>
        </a>

        <a href="{% url 'candidate_applications_list' %}">
            <i class="fa-solid fa-file-lines"></i>
            <span class="sidebar-text">My Applications</span>
        </a>

        <a href="{% url 'candidate_interviews_list' %}">
            <i class="fa-solid fa-calendar-days"></i>
            <span class="sidebar-text">My Interviews</span>
        </a>
        <a href="{% url 'candidate_profile' %}">
            <i class="fa-solid fa-user"></i>
            <span class="sidebar-text">My Profile</span>
        </a>
        <a href="{% url 'logout' %}">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="sidebar-text">Logout</span>
        </a>
    </aside>

    <main class="main">
        <div class="navbar">
            <h2>Candidate Dashboard</h2>

            <div class="user-info">
                <i class="fa-solid fa-user"></i>
                Hello, {{ request.user.username }}
            </div>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<script>
    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('closed');
    }
</script>

</body>
</html>
