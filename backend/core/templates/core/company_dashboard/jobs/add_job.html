{% extends 'core/company_dashboard/base_company.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/company/jobs/add_jobs.css' %}?v=3">
{% endblock %}

{% block content %}

<div class="job-form-header">
    <div>
        <span class="section-label">Create Job</span>
        <h1>Add New Job</h1>
        <p>Create a clear job opening for candidates to apply.</p>
    </div>

    <a href="{% url 'company_jobs_list' %}" class="secondary-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Jobs
    </a>
</div>

<div class="job-form-card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Job Title</label>
                <input type="text" name="job_title" placeholder="e.g. Backend Developer" required>
            </div>

            <div class="form-group">
                <label>Job Type</label>
                <input type="text" name="job_type" placeholder="Full-time, Part-time, Remote">
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" placeholder="e.g. Lebanon" required>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="Open">Open</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Minimum Salary</label>
                <input type="number" name="min_salary" placeholder="600">
            </div>

            <div class="form-group">
                <label>Maximum Salary</label>
                <input type="number" name="max_salary" placeholder="1000">
            </div>

            <div class="form-group full-width">
                <label>Description</label>
                <textarea name="description" placeholder="Write the job responsibilities, requirements, and needed skills..."></textarea>
            </div>
        </div>

        <div class="form-footer">
            <button type="submit" class="primary-btn">
                <i class="fa-solid fa-plus"></i>
                Save Job
            </button>
        </div>
    </form>
</div>

{% endblock %}
