{% extends 'core/admin_dashboard/base_admin.html' %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Add Company</h1>
        <p class="page-subtitle">Create a company account and add company information.</p>
    </div>

    <a href="{% url 'companies_list' %}" class="secondary-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Companies
    </a>
</div>

{% if error %}
    <div class="card error-card">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ error }}
    </div>
{% endif %}

<div class="card info-section-card">
    <form method="POST">
        {% csrf_token %}

        <h3>
            <i class="fa-solid fa-user-lock"></i>
            Company Login Account
        </h3>

        <div class="form-grid">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="example_company" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="company@example.com" required>
            </div>

            <div class="form-group full-width">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter company password" required>
            </div>
        </div>

        <hr class="section-divider">

        <h3>
            <i class="fa-solid fa-building"></i>
            Company Information
        </h3>

        <div class="form-grid">
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="company_name" placeholder="TechNova Solutions" required>
            </div>

            <div class="form-group">
                <label>Contact Name</label>
                <input type="text" name="contact_name" placeholder="Omar Khaled" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="+96170111222" required>
            </div>

            <div class="form-group">
                <label>Website</label>
                <input type="url" name="website" placeholder="https://company.com">
            </div>

            <div class="form-group">
                <label>LinkedIn URL</label>
                <input type="url" name="linkedin_url" placeholder="https://linkedin.com/company/company-name">
            </div>

            <div class="form-group">
                <label>Industry</label>
                <input type="text" name="industry" placeholder="Software Development" required>
            </div>

            <div class="form-group">
                <label>Country</label>
                <input type="text" name="country" placeholder="UAE" required>
            </div>

            <div class="form-group">
                <label>Company Size</label>
                <input type="text" name="company_size" placeholder="5-50">
            </div>

            <div class="form-group full-width">
                <label>Notes</label>
                <textarea name="notes" placeholder="Add internal notes about this company..."></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">
                <i class="fa-solid fa-plus"></i>
                Create Company
            </button>

            <a href="{% url 'companies_list' %}" class="secondary-btn">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
