{% extends 'core/admin_dashboard/base_admin.html' %}
{% block content %}

<h1>Edit Activity</h1>

<a href="{% url 'activities_list' %}" class="btn">Back to Activities</a>

<br><br>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <label>Application</label><br>
        <select name="application" required>

            {% for application in applications %}
                <option
                    value="{{ application.id }}"
                    {% if application.id == activity.application.id %}selected{% endif %}
                >
                    {{ application.candidate.full_name }} - {{ application.job.job_title }}
                </option>
            {% endfor %}

        </select><br><br>

        <label>Activity Type</label><br>
        <input
            type="text"
            name="activity_type"
            value="{{ activity.activity_type }}"
            required
        ><br><br>

        <label>Due Date</label><br>
        <input
            type="datetime-local"
            name="due_date"
            value="{{ activity.due_date|date:'Y-m-d\\TH:i' }}"
            required
        ><br><br>

        <label>Status</label><br>
        <select name="status" required>

            {% for value, label in status_choices %}
                <option
                    value="{{ value }}"
                    {% if value == activity.status %}selected{% endif %}
                >
                    {{ label }}
                </option>
            {% endfor %}

        </select><br><br>

        <label>Notes</label><br>
        <textarea name="notes">{{ activity.notes }}</textarea><br><br>

        <button type="submit" class="btn">Update Activity</button>
    </form>
</div>

{% endblock %}
