{% extends 'core/admin_dashboard/base_admin.html' %}

{% block content %}

<h1>Edit Company</h1>

<a href="{% url 'companies_list' %}" class="btn">Back to Companies</a>

<br><br>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <h3>Company Login Account</h3>

        <label>Username</label>
        <input type="text" name="username" value="{% if company.user %}{{ company.user.username }}{% endif %}" required>

        <label>Email</label>
        <input type="email" name="email" value="{% if company.user %}{{ company.user.email }}{% endif %}" required>

        <hr>

        <h3>Company Information</h3>

        <label>Company Name</label>
        <input type="text" name="company_name" value="{{ company.company_name }}" required>

        <label>Contact Name</label>
        <input type="text" name="contact_name" value="{{ company.contact_name }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ company.phone }}" required>

        <label>Website</label>
        <input type="url" name="website" value="{{ company.website }}">

        <label>LinkedIn URL</label>
        <input type="url" name="linkedin_url" value="{{ company.linkedin_url }}">

        <label>Industry</label>
        <input type="text" name="industry" value="{{ company.industry }}" required>

        <label>Country</label>
        <input type="text" name="country" value="{{ company.country }}" required>

        <label>Company Size</label>
        <input type="text" name="company_size" value="{{ company.company_size }}">

        <label>Notes</label>
        <textarea name="notes">{{ company.notes }}</textarea>

        <button type="submit" class="btn">Update Company</button>
    </form>
</div>

{% endblock %}
