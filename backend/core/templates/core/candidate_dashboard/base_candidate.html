<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Dashboard</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

     <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #020617, #1e293b);
            color: white;
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar.closed {
            width: 80px;
        }

        .sidebar.closed .sidebar-text,
        .sidebar.closed .logo {
            display: none;
        }

        .sidebar.closed a {
            justify-content: center;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
        }

        .toggle-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e2e8f0;
            text-decoration: none;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #2563eb;
            color: white;
        }

        .sidebar i {
            width: 20px;
        }

        /* Main */
        .main {
            flex: 1;
        }

        .navbar {
            background: white;
            padding: 25px 35px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #1e293b;
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 10px;
        }

        .container {
            padding: 35px;
        }

        /* Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 32px;
        }

        .dashboard-header p {
            color: #64748b;
            margin-top: 8px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
            margin-top: 25px;
        }

        .card,
        .stat-card,
        .quick-actions {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: #dbeafe;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-size: 24px;
        }

        .stat-card h3 {
            margin: 0;
            color: #2563eb;
            font-size: 18px;
        }

        .stat-card p {
            font-size: 30px;
            margin: 10px 0 0;
            font-weight: bold;
        }

        .quick-actions {
            margin-top: 35px;
        }

        .quick-actions h2 {
            margin-top: 0;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f172a;
            color: white;
            padding: 14px;
            text-align: left;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f8fafc;
        }

        /* Forms */
        form {
            display: grid;
            gap: 16px;
        }

        form label {
            font-weight: bold;
            margin-bottom: 6px;
        }

        form input,
        form textarea,
        form select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }

        form textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

            .small-btn {
            display: inline-block;
            padding: 7px 11px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
            margin-right: 5px;
            color: white;
        }

        .view-btn {
            background: #2563eb;
        }

        .edit-btn {
            background: #16a34a;
        }

        .delete-btn {
            background: #dc2626;
        }
        .page-actions {
        display: flex;
        gap: 10px;
        margin: 20px 0 30px;
    }
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">RecruitCRM</div>

            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <a href="{% url 'candidate_dashboard' %}">
            <i class="fa-solid fa-house"></i>
            <span class="sidebar-text">Dashboard</span>
        </a>

        <a href="{% url 'candidate_jobs_list' %}">
            <i class="fa-solid fa-briefcase"></i>
            <span class="sidebar-text">Available Jobs</span>
        </a>

        <a href="{% url 'candidate_applications_list' %}">
            <i class="fa-solid fa-file-lines"></i>
            <span class="sidebar-text">My Applications</span>
        </a>

        <a href="{% url 'logout' %}">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="sidebar-text">Logout</span>
        </a>
    </aside>

    <main class="main">
        <div class="navbar">
            <h2>Candidate Dashboard</h2>

            <div class="user-info">
                <i class="fa-solid fa-user"></i>
                Hello, {{ request.user.username }}
            </div>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<script>
    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('closed');
    }
</script>

</body>
</html>
