<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Dashboard</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
/* 
   GLOBAL RESET
*/
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
}

a {
    text-decoration: none;
}

/* 
   MAIN LAYOUT
*/
.layout {
    display: flex;
    min-height: 100vh;
    align-items: flex-start;
}

.main {
    flex: 1;
    min-width: 0;
}

.container {
    padding: 35px;
}

/* 
  SIDEBAR
*/
.sidebar {
    width: 260px;
    height: 100vh;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, #020617, #1e293b);
    color: white;
    padding: 20px 15px;
    transition: width 0.3s ease;
    overflow-y: auto;
}

.sidebar.closed {
    width: 80px;
}

.sidebar.closed .sidebar-text,
.sidebar.closed .logo {
    display: none;
}

.sidebar.closed a {
    justify-content: center;
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.logo {
    font-size: 26px;
    font-weight: bold;
}

.toggle-btn {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e2e8f0;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: #2563eb;
    color: white;
}

.sidebar i {
    width: 20px;
}

/* 
    NAVBAR
*/
.navbar {
    background: white;
    padding: 25px 35px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h2 {
    margin: 0;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    color: #1e293b;
    background: #f1f5f9;
    padding: 10px 16px;
    border-radius: 10px;
}

/* 
   PAGE HEADERS
*/
.dashboard-header,
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.dashboard-header h1,
.page-header h1 {
    margin: 0;
    font-size: 32px;
}

.dashboard-header p,
.page-subtitle {
    color: #64748b;
    margin-top: 8px;
    font-size: 15px;
}

.header-actions,
.page-actions {
    display: flex;
    gap: 10px;
}

/* 
   CARDS
*/
.card,
.stat-card,
.quick-actions {
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    overflow: hidden;
}
.stat-card {
    display: flex;
    align-items: center;
    gap: 18px;

    background: white;
    padding: 24px;
    border-radius: 18px;

    box-shadow: 0 6px 18px rgba(15,23,42,.08);

    transition: .25s;
}

.stat-card:hover {
    transform: translateY(-4px);
}
.info-section-card {
    margin-bottom: 28px;
}

.info-section-card h3 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 0;
    margin-bottom: 20px;
}

.info-section-card h3 i {
    color: #2563eb;
}

.info-section-card p {
    margin: 12px 0;
    color: #334155;
}

/* 
   BUTTONS
*/
.action-btn,
.primary-btn,
.secondary-btn,
.small-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.action-btn,
.primary-btn {
    background: #2563eb;
    color: white;
}

.action-btn {
    padding: 12px 18px;
    border-radius: 10px;
}

.primary-btn,
.secondary-btn {
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 14px;
}

.secondary-btn {
    background: white;
    color: #0f172a;
    border: 1px solid #dbe3ef;
}

.small-btn {
    padding: 7px 11px;
    border-radius: 7px;
    font-size: 14px;
    margin-right: 5px;
    color: white;
}

.view-btn {
    background: #2563eb;
}

.edit-btn {
    background: #16a34a;
}

.delete-btn {
    background: #dc2626;
}

.action-btn:hover,
.primary-btn:hover,
.view-btn:hover {
    background: #1d4ed8;
}

/* 
   TABLES
*/
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0f172a;
    color: white;
    padding: 14px;
    text-align: left;
}

td {
    padding: 14px;
    border-bottom: 1px solid #e5e7eb;
}

tr:hover {
    background: #f8fafc;
}

.table-subtext {
    display: block;
    color: #64748b;
    font-size: 13px;
    margin-top: 4px;
}

/* 
    FORMS AND SEARCH
*/
form {
    display: grid;
    gap: 16px;
}

form label {
    font-weight: bold;
    margin-bottom: 6px;
}

form input,
form textarea,
form select {
    width: 100%;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 15px;
}

form textarea {
    min-height: 120px;
    resize: vertical;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.full-width {
    grid-column: 1 / -1;
}

.search-card {
    padding: 18px 25px;
    margin-bottom: 20px;
}

.search-form {
    display: flex;
    gap: 12px;
    align-items: center;
}

.search-form input {
    flex: 1;
}

.search-form select {
    max-width: 180px;
}

/* 
    DASHBOARD HOME
*/
.welcome-card{
    background: linear-gradient(135deg,#2563eb,#0f172a);
    color:white;
    border-radius:24px;
    padding:35px;
    margin-bottom:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:25px;
    box-shadow:0 12px 30px rgba(37,99,235,.25);
}

.welcome-left{
    display:flex;
    align-items:center;
    gap:25px;
}

.candidate-avatar{
    width:85px;
    height:85px;
    border-radius:20px;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    font-weight:900;
}

.section-label{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.15);
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
}

.welcome-card h1{
    margin:15px 0 8px;
    font-size:38px;
}

.welcome-card p{
    margin:0;
    color:#dbeafe;
}

.welcome-tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:18px;
}

.welcome-tags span{
    background:rgba(255,255,255,.15);
    padding:8px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
}

.hero-btn{
    background:white;
    color:#2563eb;
    padding:14px 20px;
    border-radius:12px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:8px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
    margin-bottom:30px;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:24px;
}

.panel{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(15,23,42,.08);
}

.panel-header h2{
    margin:0;
}

.panel-header p{
    color:#64748b;
}

.quick-action-list{
    display:grid;
    gap:15px;
    margin-top:20px;
}

.quick-action-list a{
    display:flex;
    align-items:center;
    gap:15px;
    padding:16px;
    border:1px solid #e2e8f0;
    border-radius:14px;
    color:#0f172a;
    background:#f8fafc;
    transition:.2s;
}

.quick-action-list a:hover{
    background:#eff6ff;
}

.quick-action-list i{
    width:45px;
    height:45px;
    background:#2563eb;
    color:white;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.profile-mini{
    text-align:center;
    margin-top:20px;
}

.profile-mini .candidate-avatar{
    margin:auto;
}

.profile-mini h3{
    margin:15px 0 5px;
}

.profile-mini p{
    color:#64748b;
}

.outline-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#eff6ff;
    color:#2563eb;
    padding:12px 16px;
    border-radius:12px;
    font-weight:700;
}
/* 
    SHARED MINI STATS
*/
.candidate-job-stats-grid,
.candidate-application-stats-grid {
    display: grid;
    gap: 18px;
    margin-bottom: 24px;
}

.candidate-job-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    margin-bottom: 30px;
}
.candidate-application-stats-grid {
    grid-template-columns: repeat(5, 1fr);
}

.mini-stat-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
}

.mini-stat-card i {
    width: 48px;
    height: 48px;
    background: #dbeafe;
    color: #2563eb;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
}

.mini-stat-card span {
    color: #64748b;
    font-size: 14px;
}

.mini-stat-card strong {
    display: block;
    font-size: 26px;
    color: #0f172a;
    margin-top: 4px;
}

/* 
    STATUS BADGES
*/
.status-pill,
.app-status-badge {
    display: inline-block;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
}

.status-pill,
.status-applied {
    background: #dbeafe;
    color: #1d4ed8;
}

.status-screening {
    background: #fef3c7;
    color: #92400e;
}

.status-shortlisted {
    background: #ede9fe;
    color: #5b21b6;
}

.status-interview-scheduled,
.status-interview-done {
    background: #cffafe;
    color: #0e7490;
}

.status-evaluated {
    background: #e0e7ff;
    color: #3730a3;
}

.status-offer-sent {
    background: #fef9c3;
    color: #854d0e;
}

.status-hired {
    background: #dcfce7;
    color: #166534;
}

.status-rejected {
    background: #fee2e2;
    color: #991b1b;
}

/* 
   DETAILS PAGES
*/
.details-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    margin-bottom: 28px;
}

.info-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 18px;
}

.info-box span {
    display: block;
    color: #64748b;
    margin-bottom: 8px;
    font-size: 14px;
}

.info-box strong {
    color: #0f172a;
    font-size: 17px;
}

.job-info-grid,
.application-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.description-box {
    margin-top: 24px;
}

.description-box p {
    color: #334155;
    line-height: 1.7;
}

.application-status-card {
    margin-top: 28px;
}

/* 
    CANDIDATE JOBS PAGE
*/
.candidate-jobs-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
}

.candidate-job-card {
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    border: 1px solid #e2e8f0;
    transition: 0.2s ease;
}

.candidate-job-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
}

.job-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
}

.job-card-top h3 {
    margin: 0 0 8px;
    color: #0f172a;
    font-size: 22px;
}

.job-card-top p {
    color: #64748b;
    margin: 0;
}

.job-card-info {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 18px 0;
}

.job-card-info span {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #334155;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
}

.job-card-info i {
    color: #2563eb;
    margin-right: 5px;
}

.job-card-description {
    color: #475569;
    line-height: 1.6;
    min-height: 65px;
}

.job-card-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.already-applied-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #dcfce7;
    color: #166534;
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
}

/* 
    APPLICATION DETAILS PAGE
*/
.candidate-application-hero,
.candidate-job-hero {
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: white;
    border-radius: 22px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
}

.candidate-application-hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
}

.candidate-application-hero h1,
.candidate-job-hero h1 {
    font-size: 34px;
    margin: 14px 0 8px;
}

.candidate-application-hero p,
.candidate-job-hero p {
    color: #dbeafe;
    margin: 0 0 16px;
}

.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
}

.candidate-job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.candidate-job-tags span {
    background: rgba(255,255,255,0.15);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
}

/* 
    APPLICATION PROGRESS
*/
.progress-steps {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 16px;
}

.progress-step {
    min-width: 90px;
    text-align: center;
    color: #94a3b8;
    font-weight: 700;
    font-size: 13px;
}

.progress-step i {
    width: 42px;
    height: 42px;
    background: #e2e8f0;
    color: #64748b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 8px;
}

.progress-step.active {
    color: #0f172a;
}

.progress-step.active i {
    background: #2563eb;
    color: white;
}

.progress-line {
    flex: 1;
    height: 3px;
    background: #dbeafe;
    border-radius: 999px;
    margin-bottom: 22px;
}

/* 
    EMPTY STATE
*/
.empty-state {
    text-align: center;
    padding: 45px 20px;
}

.empty-icon {
    width: 70px;
    height: 70px;
    background: #dbeafe;
    color: #2563eb;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    font-size: 30px;
}

/* 
    PAGINATION
*/
.pagination {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.pagination a {
    background: #2563eb;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
}

.pagination span {
    font-weight: 600;
    color: #0f172a;
}

/* 
   CANDIDATE INTERVIEWS PAGE
*/
/* 
   CANDIDATE INTERVIEWS PAGE
*/
.candidate-interview-stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 24px;
}

.interview-status-badge {
    display: inline-block;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
}

.interview-status-scheduled {
    background: #dbeafe;
    color: #1d4ed8;
}

.interview-status-completed {
    background: #dcfce7;
    color: #166534;
}

.interview-status-cancelled {
    background: #fee2e2;
    color: #991b1b;
}

.candidate-interview-hero {
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: white;
    border-radius: 22px;
    padding: 32px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
}

.candidate-interview-hero h1 {
    font-size: 34px;
    margin: 14px 0 8px;
}

.candidate-interview-hero p {
    color: #dbeafe;
    margin: 0 0 16px;
}

.interview-details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    margin-bottom: 28px;
}

.clean-info-list {
    display: grid;
    gap: 14px;
}

.clean-info-list div {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 16px;
}

.clean-info-list span {
    display: block;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 6px;
}

.clean-info-list strong {
    color: #0f172a;
    font-size: 16px;
}

.interview-info-cards {
    display: grid;
    gap: 14px;
}

.interview-notes-card {
    margin-top: 0;
}

/* 
   CANDIDATE PROFILE HERO
*/
.candidate-profile-hero {
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: white;
    border-radius: 22px;
    padding: 34px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 28px;
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
}

.candidate-profile-main {
    display: flex;
    align-items: center;
    gap: 26px;
}

.candidate-large-avatar {
    width: 82px;
    height: 82px;
    background: white;
    color: #2563eb;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 38px;
    text-transform: uppercase;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.25);
}

.profile-title-area {
    display: flex;
    flex-direction: column;
}

.candidate-profile-hero h1 {
    font-size: 36px;
    margin: 12px 0 6px;
    line-height: 1.1;
}

.profile-position {
    color: #dbeafe;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 16px;
}

.profile-cv-btn {
    background: white;
    color: #2563eb;
    padding: 13px 20px;
    border-radius: 14px;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
}

.profile-cv-btn:hover {
    background: #eff6ff;
}


.candidate-large-avatar {
    width: 88px;
    height: 88px;
    background: white;
    color: #2563eb;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 36px;
    text-transform: uppercase;
}

.candidate-profile-hero h1 {
    font-size: 34px;
    margin: 14px 0 8px;
}

.candidate-profile-hero p {
    color: #dbeafe;
    margin: 0 0 16px;
}

.profile-cv-btn {
    background: white;
    color: #2563eb;
    padding: 12px 18px;
    border-radius: 12px;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.profile-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    margin-bottom: 28px;
}

.profile-link {
    display: inline-flex;
    color: #2563eb;
    font-weight: 800;
}

.skills-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #334155;
    padding: 18px;
    border-radius: 14px;
    line-height: 1.7;
    white-space: pre-line;
}

/* 
   CANDIDATE PROFILE EDIT PAGE
*/
.profile-edit-card {
    padding: 28px;
}

.form-section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #0f172a;
    font-size: 20px;
    font-weight: 800;
    margin: 10px 0 20px;
}

.form-section-title i {
    color: #2563eb;
}

.file-upload-box {
    border: 1px dashed #93c5fd;
    background: #eff6ff;
    border-radius: 14px;
    padding: 18px;
}

.file-upload-box p {
    margin-bottom: 0;
    color: #334155;
}

.file-upload-box a {
    color: #2563eb;
    font-weight: 800;
}

.form-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
}

.full-save-btn {
    width: auto;
    min-width: 180px;
}
/* 
  RESPONSIVE DESIGN
*/

/* Medium screens */
@media (max-width: 1200px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .dashboard-grid {
        grid-template-columns: 1fr;
    }
}

/* Tablets */
@media (max-width: 1100px) {
    .candidate-application-stats-grid,
    .candidate-interview-stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .candidate-application-hero,
    .candidate-interview-hero {
        flex-direction: column;
        align-items: flex-start;
    }
}

/* Small laptops */
@media (max-width: 1000px) {
    .candidate-jobs-grid,
    .candidate-job-stats-grid {
        grid-template-columns: 1fr;
    }
}

/* Tablets and small screens */
@media (max-width: 900px) {
    .details-grid,
    .interview-details-grid,
    .job-info-grid,
    .application-info-grid,
    .profile-grid {
        grid-template-columns: 1fr;
    }

    .progress-steps {
        flex-direction: column;
        align-items: flex-start;
    }

    .progress-line {
        width: 3px;
        height: 22px;
        margin-left: 20px;
        margin-bottom: 0;
    }

    .progress-step {
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
    }

    .progress-step i {
        margin: 0;
    }

    .candidate-profile-hero,
    .candidate-profile-main {
        flex-direction: column;
        align-items: flex-start;
    }

    .profile-cv-btn {
        width: 100%;
        justify-content: center;
    }
}

/* Mobile */
@media (max-width: 768px) {
    .sidebar {
        width: 80px;
    }

    .sidebar .sidebar-text,
    .sidebar .logo {
        display: none;
    }

    .sidebar a {
        justify-content: center;
    }

    .navbar {
        padding: 20px;
    }

    .container {
        padding: 20px;
    }

    .dashboard-header,
    .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    .search-form {
        flex-direction: column;
        align-items: stretch;
    }

    .search-form select {
        max-width: 100%;
    }

    .welcome-card,
    .welcome-left {
        flex-direction: column;
        align-items: flex-start;
    }

    .stats-grid {
        grid-template-columns: 1fr;
    }

    .hero-btn {
        width: 100%;
        justify-content: center;
    }
}

/* Very small mobile */
@media (max-width: 700px) {
    .candidate-application-stats-grid,
    .candidate-interview-stats-grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">RecruitCRM</div>

            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <a href="{% url 'candidate_dashboard' %}">
            <i class="fa-solid fa-house"></i>
            <span class="sidebar-text">Dashboard</span>
        </a>

        <a href="{% url 'candidate_jobs_list' %}">
            <i class="fa-solid fa-briefcase"></i>
            <span class="sidebar-text">Available Jobs</span>
        </a>

        <a href="{% url 'candidate_applications_list' %}">
            <i class="fa-solid fa-file-lines"></i>
            <span class="sidebar-text">My Applications</span>
        </a>

        <a href="{% url 'candidate_interviews_list' %}">
            <i class="fa-solid fa-calendar-days"></i>
            <span class="sidebar-text">My Interviews</span>
        </a>
        <a href="{% url 'candidate_profile' %}">
            <i class="fa-solid fa-user"></i>
            <span class="sidebar-text">My Profile</span>
        </a>
        <a href="{% url 'logout' %}">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="sidebar-text">Logout</span>
        </a>
    </aside>

    <main class="main">
        <div class="navbar">
            <h2>Candidate Dashboard</h2>

            <div class="user-info">
                <i class="fa-solid fa-user"></i>
                Hello, {{ request.user.username }}
            </div>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<script>
    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('closed');
    }
</script>

</body>
</html>
