{% extends 'core/base.html' %}

{% block content %}

<h1>Recruitment CRM Dashboard</h1>

<div class="stats-container">
    <div class="stat-card">
        <h3>Candidates</h3>
        <p>{{ total_candidates }}</p>
    </div>

    <div class="stat-card">
        <h3>Companies</h3>
        <p>{{ total_companies }}</p>
    </div>

    <div class="stat-card">
        <h3>Jobs</h3>
        <p>{{ total_jobs }}</p>
    </div>

    <div class="stat-card">
        <h3>Applications</h3>
        <p>{{ total_applications }}</p>
    </div>

    <div class="stat-card">
        <h3>Interviews</h3>
        <p>{{ total_interviews }}</p>
    </div>
</div>

<br>

<a href="{% url 'candidates_list' %}" class="btn">View Candidates</a>

{% endblock %}
