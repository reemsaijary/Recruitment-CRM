{% extends 'core/admin_dashboard/base_admin.html' %}

{% block content %}

<h1>Delete Evaluation</h1>

<div class="card">
    <p>
        Are you sure you want to delete evaluation for
        <strong>{{ evaluation.application.candidate.full_name }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Yes, Delete</button>
        <a href="{% url 'evaluations_list' %}" class="btn">Cancel</a>
    </form>
</div>

{% endblock %}
