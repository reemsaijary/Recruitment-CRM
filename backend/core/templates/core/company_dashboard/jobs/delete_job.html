{% extends 'core/company_dashboard/base_company.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/company/jobs/delete_job.css' %}?v=1">
{% endblock %}

{% block content %}

<div class="delete-job-page">
    <div class="delete-job-card">
        <div class="delete-job-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <span class="section-label">Danger Zone</span>

        <h1>Delete Job?</h1>

        <p>
            Are you sure you want to delete
            <strong>{{ job.job_title }}</strong>?
            This action cannot be undone.
        </p>

        <form method="POST" class="delete-job-actions">
            {% csrf_token %}

            <a href="{% url 'company_jobs_list' %}" class="secondary-btn">
                Cancel
            </a>

            <button type="submit" class="danger-btn">
                <i class="fa-solid fa-trash"></i>
                Yes, Delete
            </button>
        </form>
    </div>
</div>

{% endblock %}
