<!DOCTYPE html>
<html>
<head>
    <title>Recruitment CRM</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Navbar */
        .navbar {
            background-color: #1e293b;
            color: white;
            padding: 15px 30px;
        }

        .navbar h2 {
            margin: 0;
        }

        /* Main content */
        .container {
            padding: 30px;
        }

        /* Cards */
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        table th,
        table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background-color: #1e293b;
            color: white;
        }

        /* Statistics Cards */
        .stats-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            margin: 0;
            color: #2563eb;
        }

        .stat-card p {
            font-size: 22px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>Recruitment CRM System</h2>
    </div>

    <!-- Main Content -->
    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
