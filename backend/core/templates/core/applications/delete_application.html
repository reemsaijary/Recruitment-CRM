{% extends 'core/base.html' %}

{% block content %}

<h1>Delete Application</h1>

<div class="card">
    <p>
        Are you sure you want to delete application for
        <strong>{{ application.candidate.full_name }}</strong>
        applying to
        <strong>{{ application.job.job_title }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Yes, Delete</button>
        <a href="{% url 'applications_list' %}" class="btn">Cancel</a>
    </form>
</div>

{% endblock %}
