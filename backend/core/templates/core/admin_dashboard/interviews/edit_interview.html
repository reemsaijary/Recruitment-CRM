{% extends 'core/base.html' %}

{% block content %}

<h1>Edit Interview</h1>

<a href="{% url 'interviews_list' %}" class="btn">Back to Interviews</a>

<br><br>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <label>Application</label><br>
        <select name="application" required>
            {% for application in applications %}
                <option value="{{ application.id }}" {% if application.id == interview.application.id %}selected{% endif %}>
                    {{ application.candidate.full_name }} - {{ application.job.job_title }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Interview Date</label><br>
        <input
            type="datetime-local"
            name="interview_date"
            value="{{ interview.interview_date|date:'Y-m-d\\TH:i' }}"
            required
        ><br><br>

        <label>Interview Type</label><br>
        <input type="text" name="interview_type" value="{{ interview.interview_type }}" required><br><br>

        <label>Status</label><br>
        <select name="status" required>
            {% for value, label in status_choices %}
                <option value="{{ value }}" {% if value == interview.status %}selected{% endif %}>
                    {{ label }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Notes</label><br>
        <textarea name="notes">{{ interview.notes }}</textarea><br><br>

        <button type="submit" class="btn">Update Interview</button>
    </form>
</div>

{% endblock %}
