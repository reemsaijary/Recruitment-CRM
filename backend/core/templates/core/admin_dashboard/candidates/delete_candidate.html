{% extends 'core/base.html' %}

{% block content %}

<h1>Delete Candidate</h1>

<div class="card">
    <p>Are you sure you want to delete <strong>{{ candidate.full_name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Yes, Delete</button>
        <a href="{% url 'candidates_list' %}" class="btn">Cancel</a>
    </form>
</div>

{% endblock %}
