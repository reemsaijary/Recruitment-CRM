{% extends 'core/company_dashboard/base_company.html' %}

{% block content %}

<h1>Add Job</h1>

<a href="{% url 'company_jobs_list' %}" class="action-btn">Back to Jobs</a>

<br><br>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" name="job_title" required>
            </div>

            <div class="form-group">
                <label>Job Type</label>
                <input type="text" name="job_type" placeholder="Full-time, Part-time, Remote">
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" required>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="Open">Open</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Minimum Salary</label>
                <input type="number" name="min_salary">
            </div>

            <div class="form-group">
                <label>Maximum Salary</label>
                <input type="number" name="max_salary">
            </div>

            <div class="form-group full-width">
                <label>Description</label>
                <textarea name="description"></textarea>
            </div>

        </div>

        <button type="submit" class="action-btn">Save Job</button>
    </form>
</div>

{% endblock %}
