{% extends 'core/admin_dashboard/base_admin.html' %}
{% block content %}

<h1>Delete Company</h1>

<div class="card">
    <p>Are you sure you want to delete <strong>{{ company.company_name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Yes, Delete</button>
        <a href="{% url 'companies_list' %}" class="btn">Cancel</a>
    </form>
</div>

{% endblock %}
