<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Dashboard</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

     <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #020617, #1e293b);
            color: white;
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar.closed {
            width: 80px;
        }

        .sidebar.closed .sidebar-text,
        .sidebar.closed .logo {
            display: none;
        }

        .sidebar.closed a {
            justify-content: center;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
        }

        .toggle-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e2e8f0;
            text-decoration: none;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #2563eb;
            color: white;
        }

        .sidebar i {
            width: 20px;
        }

        /* Main */
        .main {
            flex: 1;
        }

        .navbar {
            background: white;
            padding: 25px 35px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #1e293b;
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 10px;
        }

        .container {
            padding: 35px;
        }

        /* Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 32px;
        }

        .dashboard-header p {
            color: #64748b;
            margin-top: 8px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
            margin-top: 25px;
        }

        .card,
        .stat-card,
        .quick-actions {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: #dbeafe;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-size: 24px;
        }

        .stat-card h3 {
            margin: 0;
            color: #2563eb;
            font-size: 18px;
        }

        .stat-card p {
            font-size: 30px;
            margin: 10px 0 0;
            font-weight: bold;
        }

        .quick-actions {
            margin-top: 35px;
        }

        .quick-actions h2 {
            margin-top: 0;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f172a;
            color: white;
            padding: 14px;
            text-align: left;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f8fafc;
        }

        /* Forms */
        form {
            display: grid;
            gap: 16px;
        }

        form label {
            font-weight: bold;
            margin-bottom: 6px;
        }

        form input,
        form textarea,
        form select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }

        form textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

            .small-btn {
            display: inline-block;
            padding: 7px 11px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
            margin-right: 5px;
            color: white;
        }

        .view-btn {
            background: #2563eb;
        }

        .edit-btn {
            background: #16a34a;
        }

        .delete-btn {
            background: #dc2626;
        }
        .page-actions {
        display: flex;
        gap: 10px;
        margin: 20px 0 30px;
    }
            .stat-link {
            text-decoration: none;
            color: inherit;
            transition: 0.2s ease;
        }

        .stat-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 32px;
        }

        .page-subtitle {
            margin-top: 6px;
            color: #64748b;
            font-size: 15px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .primary-btn,
        .secondary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 10px;
            padding: 11px 18px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .primary-btn {
            background: #2563eb;
            color: white;
        }

        .secondary-btn {
            background: white;
            color: #0f172a;
            border: 1px solid #dbe3ef;
        }

        .status-pill {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        .info-section-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .info-section-card h3 i {
            color: #2563eb;
        }

        .info-section-card p {
            margin: 12px 0;
            color: #334155;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .info-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 18px;
        }

        .info-box span {
            display: block;
            color: #64748b;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-box strong {
            color: #0f172a;
            font-size: 17px;
        }

        .description-box {
            margin-top: 24px;
        }

        .description-box h3 {
            margin-bottom: 10px;
        }

        .description-box p {
            color: #334155;
            line-height: 1.7;
        }

        .empty-state {
            text-align: center;
            padding: 45px 20px;
        }

        .empty-icon {
            width: 70px;
            height: 70px;
            background: #dbeafe;
            color: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 30px;
        }
        /* =====================================================
   CANDIDATE JOBS PAGE
===================================================== */
.candidate-job-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 24px;
}

.mini-stat-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
}

.mini-stat-card i {
    width: 48px;
    height: 48px;
    background: #dbeafe;
    color: #2563eb;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
}

.mini-stat-card span {
    color: #64748b;
    font-size: 14px;
}

.mini-stat-card strong {
    display: block;
    font-size: 26px;
    color: #0f172a;
    margin-top: 4px;
}

.search-card {
    padding: 18px 25px;
    margin-bottom: 20px;
}

.search-form {
    display: flex;
    gap: 12px;
    align-items: center;
}

.search-form input {
    flex: 1;
}

.search-form select {
    max-width: 180px;
}

.candidate-jobs-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
}

.candidate-job-card {
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    border: 1px solid #e2e8f0;
    transition: 0.2s ease;
}

.candidate-job-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
}

.job-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
}

.job-card-top h3 {
    margin: 0 0 8px;
    color: #0f172a;
    font-size: 22px;
}

.job-card-top p {
    color: #64748b;
    margin: 0;
}

.job-card-info {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 18px 0;
}

.job-card-info span {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #334155;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
}

.job-card-info i {
    color: #2563eb;
    margin-right: 5px;
}

.job-card-description {
    color: #475569;
    line-height: 1.6;
    min-height: 65px;
}

.job-card-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.already-applied-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #dcfce7;
    color: #166534;
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
}

.candidate-job-hero {
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: white;
    border-radius: 22px;
    padding: 32px;
    margin-bottom: 26px;
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
}

.candidate-job-hero h1 {
    font-size: 34px;
    margin: 14px 0 8px;
}

.candidate-job-hero p {
    color: #dbeafe;
    margin: 0 0 16px;
}

.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
}

.candidate-job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.candidate-job-tags span {
    background: rgba(255,255,255,0.15);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
}

.pagination {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.pagination a {
    text-decoration: none;
    background: #2563eb;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
}

.pagination span {
    font-weight: 600;
    color: #0f172a;
}

@media (max-width: 1000px) {
    .candidate-jobs-grid {
        grid-template-columns: 1fr;
    }

    .candidate-job-stats-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    .search-form {
        flex-direction: column;
        align-items: stretch;
    }

    .search-form select {
        max-width: 100%;
    }
}
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">RecruitCRM</div>

            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <a href="{% url 'candidate_dashboard' %}">
            <i class="fa-solid fa-house"></i>
            <span class="sidebar-text">Dashboard</span>
        </a>

        <a href="{% url 'candidate_jobs_list' %}">
            <i class="fa-solid fa-briefcase"></i>
            <span class="sidebar-text">Available Jobs</span>
        </a>

        <a href="{% url 'candidate_applications_list' %}">
            <i class="fa-solid fa-file-lines"></i>
            <span class="sidebar-text">My Applications</span>
        </a>

        <a href="{% url 'candidate_interviews_list' %}">
            <i class="fa-solid fa-calendar-days"></i>
            <span class="sidebar-text">My Interviews</span>
        </a>
        <a href="{% url 'candidate_profile' %}">
            <i class="fa-solid fa-user"></i>
            <span class="sidebar-text">My Profile</span>
        </a>
        <a href="{% url 'logout' %}">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="sidebar-text">Logout</span>
        </a>
    </aside>

    <main class="main">
        <div class="navbar">
            <h2>Candidate Dashboard</h2>

            <div class="user-info">
                <i class="fa-solid fa-user"></i>
                Hello, {{ request.user.username }}
            </div>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<script>
    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('closed');
    }
</script>

</body>
</html>
