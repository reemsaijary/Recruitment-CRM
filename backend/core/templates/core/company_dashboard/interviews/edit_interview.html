{% extends 'core/company_dashboard/base_company.html' %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Edit Interview</h1>
        <p class="page-subtitle">Update interview date, type, status, and notes.</p>
    </div>

    <a href="{% url 'company_interview_details' interview.id %}" class="secondary-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Interview
    </a>
</div>

<div class="card job-form-card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Interview Date</label>
                <input type="datetime-local" name="interview_date" required>
            </div>

            <div class="form-group">
                <label>Interview Type</label>
                <input type="text" name="interview_type" value="{{ interview.interview_type }}" required>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="Scheduled" {% if interview.status == 'Scheduled' %}selected{% endif %}>Scheduled</option>
                    <option value="Completed" {% if interview.status == 'Completed' %}selected{% endif %}>Completed</option>
                    <option value="Cancelled" {% if interview.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Notes</label>
                <textarea name="notes">{{ interview.notes }}</textarea>
            </div>
        </div>

        <div class="form-footer">
            <button type="submit" class="primary-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                Update Interview
            </button>
        </div>
    </form>
</div>

{% endblock %}
